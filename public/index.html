<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DownloadMe</title>
    <meta name="description" content="DownloadMe - Universal Video Downloader">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DownloadMe">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash" class="splash-screen">
        <audio id="slashSound" src="/slash.mp3" preload="auto"></audio>
        <div class="splash-content">
            <div class="splash-logo-container">
                <div class="slash-line left-slash"></div>
                <img src="/icon-512.png" alt="DownloadMe" class="splash-logo" id="splashLogo">
                <div class="slash-line right-slash"></div>
                <div class="katana-slice"></div>
            </div>
            <h1 class="splash-title">Download<span>Me</span></h1>
            <p class="splash-sub">Universal Video Downloader</p>
            <div class="splash-loader"></div>
        </div>
    </div>

    <div class="bg"></div>
    <div class="container" id="mainApp" style="display:none;">
        <header>
            <h1>Download<span>Me</span></h1>
            <p>Universal Video Downloader</p>
        </header>

        <div class="search-section">
            <div class="input-wrapper">
                <input type="text" id="urlInput" placeholder="Tempel URL video di sini..." autocomplete="off">
                <button id="downloadBtn" onclick="startDownload()">Download</button>
            </div>
            <p class="hint">Support TikTok, IG, FB, X, YouTube, Reddit, Telegram, Pinterest, OF, dan lainnya</p>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Mendeteksi & memproses...</p>
        </div>

        <div id="result" class="result hidden"></div>
    </div>
    <script src="script.js"></script>
    <script>
        if("serviceWorker" in navigator) { navigator.serviceWorker.register("/sw.js"); }
    </script>
</body>
</html>
