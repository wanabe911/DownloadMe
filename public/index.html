<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DownloadMe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <header>
            <h1>Download<span>Me</span></h1>
            <p>Telegram & OnlyFans Downloader</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('telegram')">Telegram</button>
            <button class="tab" onclick="switchTab('onlyfans')">OnlyFans</button>
        </div>

        <div class="search-section">
            <div class="input-wrapper">
                <input type="text" id="urlInput" placeholder="Tempel URL di sini..." autocomplete="off">
                <button id="downloadBtn" onclick="startDownload()">Download</button>
            </div>
            <p class="hint" id="hintText">Contoh: https://t.me/username/123</p>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Memproses...</p>
        </div>

        <div id="result" class="result hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
